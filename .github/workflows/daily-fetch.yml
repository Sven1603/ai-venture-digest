name: Daily AI Digest Fetch

on:
  schedule:
    # Start at 04:20 UTC (off the top of the hour). The job fetches + commits
    # site data immediately, then newsletter.py WAITS until 08:30 Europe/Amsterdam
    # (06:30 UTC summer / 07:30 UTC winter) before sending — free Mailchimp can't
    # schedule, so we hold the (free, public-repo) runner until the exact moment.
    # The early start gives ~2h+ of buffer to absorb GitHub Actions cron drift.
    - cron: '20 4 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetcher
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetcher.py

      # Commit site data right after fetch so the website updates promptly and
      # a killed runner during the newsletter wait can't lose the day's data.
      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "📰 Daily digest update - $(date +'%Y-%m-%d')"
          git push

      # Waits until 08:30 Europe/Amsterdam (see config.json newsletter.send_time),
      # then sends immediately. Set NEWSLETTER_SEND_NOW=true to skip the wait.
      - name: Generate and send newsletter
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
          MAILCHIMP_REPLY_TO: ${{ secrets.MAILCHIMP_REPLY_TO }}
        run: python scripts/newsletter.py
